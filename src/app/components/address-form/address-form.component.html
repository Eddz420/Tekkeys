<div class="address-form-wrapper">
  <div class="location-detector">
    <button type="button" class="detect-location-btn" (click)="detectLocation()" [disabled]="detecting()">
      @if (detecting()) {
        <div class="spinner"></div>
        <span>Détection en cours...</span>
      } @else {
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2v4M12 18v4M22 12h-4M6 12H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2" opacity="0.3"/>
        </svg>
        <span>Détecter ma position</span>
      }
    </button>
    @if (locationError()) {
      <div class="location-error">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M8 4v5M8 11h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        {{ locationError() }}
      </div>
    }
  </div>

  <form class="address-form" (ngSubmit)="onSubmit()">
    <div class="label-selector">
      <div class="label-title">Type d'adresse</div>
      <div class="label-options">
        @for (option of labelOptions; track option.value) {
          <button
            type="button"
            class="label-option"
            [class.active]="formData().label === option.value"
            (click)="selectLabel(option.value)">
            <div class="option-icon">{{ option.icon }}</div>
            <span>{{ option.label }}</span>
          </button>
        }
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group full-width">
        <label for="full_name">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Nom complet
        </label>
        <input
          type="text"
          id="full_name"
          [(ngModel)]="formData().full_name"
          name="full_name"
          placeholder="Jean Dupont"
          required>
      </div>

      <div class="form-group full-width">
        <label for="phone">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 2h3l2 5-2 1.5c1 2 2.5 3.5 4.5 4.5L12 11l5 2v3c-8 0-15-7-15-15z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Téléphone
        </label>
        <input
          type="tel"
          id="phone"
          [(ngModel)]="formData().phone"
          name="phone"
          placeholder="+33 6 12 34 56 78"
          required>
      </div>

      <div class="form-group full-width">
        <label for="street_address">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2L2 7v9h14V7l-7-5z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 16v-5h4v5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Adresse
        </label>
        <input
          type="text"
          id="street_address"
          [(ngModel)]="formData().street_address"
          name="street_address"
          placeholder="123 Rue de la Paix"
          required>
      </div>

      <div class="form-group">
        <label for="postal_code">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="5" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 9h14M6 5V3M12 5V3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Code postal
        </label>
        <input
          type="text"
          id="postal_code"
          [(ngModel)]="formData().postal_code"
          name="postal_code"
          placeholder="75001"
          required>
      </div>

      <div class="form-group">
        <label for="city">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 16V7l5-5 5 5v9M2 7h10M7 11h4M7 14h4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Ville
        </label>
        <input
          type="text"
          id="city"
          [(ngModel)]="formData().city"
          name="city"
          placeholder="Paris"
          required>
      </div>

      <div class="form-group">
        <label for="state">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M9 2v7l5 5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Région
        </label>
        <input
          type="text"
          id="state"
          [(ngModel)]="formData().state"
          name="state"
          placeholder="Île-de-France"
          required>
      </div>

      <div class="form-group">
        <label for="country">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 9h14M9 2c-2 2-3 5-3 7s1 5 3 7M9 2c2 2 3 5 3 7s-1 5-3 7" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Pays
        </label>
        <input
          type="text"
          id="country"
          [(ngModel)]="formData().country"
          name="country"
          placeholder="France"
          required>
      </div>
    </div>

    <div class="form-footer">
      <label class="toggle-switch">
        <input
          type="checkbox"
          [(ngModel)]="formData().is_default"
          name="is_default">
        <span class="toggle-slider"></span>
        <span class="toggle-label">Adresse par défaut</span>
      </label>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">
          Annuler
        </button>
        <button type="submit" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M15 5L7 13l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Enregistrer
        </button>
      </div>
    </div>
  </form>
</div>
