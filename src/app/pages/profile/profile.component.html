<section class="profile-page">
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Mon Profil</h1>
      <p class="page-subtitle">Gérez vos informations personnelles</p>
    </div>

    <div class="profile-container">
      <div class="profile-card">
        <div class="card-header">
          <div class="header-content">
            <div class="avatar">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2" opacity="0.3"/>
                <circle cx="24" cy="18" r="8" stroke="currentColor" stroke-width="2"/>
                <path d="M8 42c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>
            <div class="header-info">
              <h2>{{ profile().full_name }}</h2>
              <p>{{ profile().email }}</p>
            </div>
          </div>
          <button class="btn-edit" (click)="toggleEdit()">
            @if (isEditing()) {
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              Annuler
            } @else {
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M14 2l4 4-10 10H4v-4L14 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Modifier
            }
          </button>
        </div>

        <form class="profile-form" (ngSubmit)="saveProfile()">
          <div class="form-grid">
            <div class="form-group full-width">
              <label for="full_name">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <circle cx="9" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                Nom complet
              </label>
              <input
                type="text"
                id="full_name"
                [(ngModel)]="profile().full_name"
                name="full_name"
                [disabled]="!isEditing()"
                placeholder="Jean Dupont"
                required>
            </div>

            <div class="form-group full-width">
              <label for="email">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <rect x="2" y="4" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M2 6l7 4 7-4" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                Email
              </label>
              <input
                type="email"
                id="email"
                [(ngModel)]="profile().email"
                name="email"
                [disabled]="!isEditing()"
                placeholder="jean.dupont@example.com"
                required>
            </div>

            <div class="form-group">
              <label for="phone">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M3 2h3l2 5-2 1.5c1 2 2.5 3.5 4.5 4.5L12 11l5 2v3c-8 0-15-7-15-15z" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                Téléphone
              </label>
              <input
                type="tel"
                id="phone"
                [(ngModel)]="profile().phone"
                name="phone"
                [disabled]="!isEditing()"
                placeholder="+33 6 12 34 56 78"
                required>
            </div>

            <div class="form-group">
              <label for="date_of_birth">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <rect x="2" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M2 8h14M6 2v4M12 2v4" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                Date de naissance
              </label>
              <input
                type="date"
                id="date_of_birth"
                [(ngModel)]="profile().date_of_birth"
                name="date_of_birth"
                [disabled]="!isEditing()"
                required>
            </div>
          </div>

          @if (isEditing()) {
            <div class="gender-selector">
              <div class="gender-title">Genre</div>
              <div class="gender-options">
                @for (option of genderOptions; track option.value) {
                  <button
                    type="button"
                    class="gender-option"
                    [class.pink]="option.value ==='female'"
                    [class.active]="profile().gender === option.value"
                    (click)="selectGender(option.value)">
                    <div class="option-icon">{{ option.icon }}</div>
                    <span>{{ option.label }}</span>
                  </button>
                }
              </div>
            </div>
          } @else {
            <div class="form-group full-width view-mode">
              <label>
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M9 6v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                Genre
              </label>
              <div class="display-value">
                {{ getGenderLabel(profile().gender) }}
              </div>
            </div>
          }

          @if (isEditing()) {
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" (click)="cancelEdit()">
                Annuler
              </button>
              <button type="submit" class="btn btn-primary" [disabled]="saving()">
                @if (saving()) {
                  <div class="spinner"></div>
                  Enregistrement...
                } @else {
                  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M15 5L7 13l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  Enregistrer
                }
              </button>
            </div>
          }
        </form>
      </div>
    </div>
  </div>
</section>
